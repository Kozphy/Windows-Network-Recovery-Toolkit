# Local quality gates — run: pre-commit install && pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=800"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: local
    hooks:
      - id: mypy-scoped
        name: mypy (scoped packages)
        entry: python -m mypy
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest-offline
        name: pytest (offline safety suite)
        entry: python -m pytest tests/policy tests/api tests/replay -q
        language: system
        pass_filenames: false
        always_run: true
