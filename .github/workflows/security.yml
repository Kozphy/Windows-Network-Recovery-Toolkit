name: Security

on:
  push:
    branches:
      - main
      - master
      - amd_version
      - "feature/**"
      - "fix/**"
      - "ci/**"
  pull_request:
    branches:
      - main
      - master
      - amd_version
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + audit tool
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pip-audit
        run: |
          mkdir -p reports
          pip-audit --format json -o reports/pip-audit.json
          pip-audit

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-${{ github.sha }}
          path: reports/pip-audit.json
          retention-days: 30

  trivy-fs:
    name: trivy (filesystem)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # exit-code "0" reports findings without failing the workflow (portfolio / bootstrap phase).
      # To gate merges on HIGH/CRITICAL filesystem findings, change both Trivy steps to exit-code: "1".
      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-sarif-${{ github.sha }}
          path: trivy-fs.sarif
          retention-days: 30

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  trivy-image:
    name: trivy (container)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build local image for scan
        run: docker build -t er-platform-api:scan-${{ github.sha }} .

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: er-platform-api:scan-${{ github.sha }}
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sarif-${{ github.sha }}
          path: trivy-image.sarif
          retention-days: 30

      - name: Upload Trivy image SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container
