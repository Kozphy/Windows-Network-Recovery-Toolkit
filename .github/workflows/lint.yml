name: Lint

on:
  push:
    branches: [main, master, amd_version]
  pull_request:
    branches: [main, master, amd_version]
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-black:
    name: ruff & black
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: >
          ruff check
          platform_core backend evidence failure_system telemetry tests

      - name: Ruff format check
        run: >
          ruff format --check
          platform_core backend evidence failure_system telemetry tests

      - name: Black format check
        run: >
          black --check
          platform_core backend evidence failure_system telemetry tests
