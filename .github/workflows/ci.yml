name: CI

on:
  push:
    branches: [main, master, amd_version]
  pull_request:
    branches: [main, master, amd_version]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Bandit (ERP package)
        run: bandit -r windows_network_toolkit src/platform_core -q

      - name: pip-audit
        continue-on-error: true
        run: pip-audit

      - name: Black check
        # Formatting debt: ~200 files pending `black .` pass — see docs/platform_engineering_gap_report.md
        continue-on-error: true
        run: black --check .

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ERP toolkit tests
        run: pytest -q windows_network_toolkit/tests tests/windows_network_toolkit

      - name: Classification matrix tests
        run: pytest -q tests/platform_core/classification

      - name: Canonical platform_core tests
        run: pytest -q tests/platform_core tests/api/test_canonical_routes.py tests/api/test_policy_preview_approval_execute_flow.py tests/api/test_metrics_route.py

      - name: Safety contract tests (ordered)
        run: |
          pytest -q tests/test_policy_safety_contract.py
          pytest -q tests/test_api_dry_run_default.py
          pytest -q tests/test_replay_determinism.py
          pytest -q tests/test_audit_contract.py
          pytest -q tests/test_evidence_level_contract.py
          pytest -q tests/test_safety_contract_extensions.py
          pytest -q tests/test_api_hardening_contract.py
          pytest -q tests/test_policy_model_unit.py
          pytest -q tests/test_fixture_regression_demo.py

      - name: Pytest (full suite + Linux integration)
        run: |
          mkdir -p reports
          pytest -q --junitxml=reports/junit.xml
          pytest -q tests/integration_linux

      - name: Fixture demo smoke (read-only CLI)
        run: |
          python -m src diagnose --fixture tests/fixtures/features_healthy_signals.json
          python -m src proxy-timeline --fixture tests/fixtures/proxy_incidents/unknown_node_powershell_proxy.json --format markdown
          python -m src proxy-policy --fixture tests/fixtures/proxy_incidents/suspicious_powershell_temp_proxy.json --format json
          python -m src proxy-report --fixture tests/fixtures/proxy_incidents/unknown_node_powershell_proxy.json --format markdown
          python -m src demo-scenario healthy --format both
          python -m src demo-scenario proxy-drift --format json
          python -m src demo-scenario final-causation --format markdown
          python -m platform_core.demo_fleet --endpoints 10 --incidents 3 --output /tmp/fleet_ci_demo
          python tools/public_release_audit.py --tracked-only

      - name: WNT JSON CLI smoke (fixture-based)
        run: |
          python -m windows_network_toolkit proxy-status --fixture tests/fixtures/enert/dead_proxy_59081.json
          python -m windows_network_toolkit proxy-disable --dry-run
          python -m windows_network_toolkit diagnose --proof --fixture tests/fixtures/enert/dead_proxy_59081.json
          python -m windows_network_toolkit proxy-owner --fixture tests/fixtures/enert/dead_proxy_59081.json

      - name: Platform health contracts (in-process)
        run: |
          pytest -q tests/test_platform_health_routes.py tests/test_compose_platform_contract.py

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ github.sha }}
          path: reports/junit.xml
          retention-days: 14

  test-windows:
    name: test-windows
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (zero-skip guard on Windows)
        shell: pwsh
        run: |
          $output = python -m pytest -q -rs 2>&1 | Out-String
          Write-Output $output
          if ($output -match '(\d+) skipped') {
            $skipped = [int]$Matches[1]
            if ($skipped -gt 0) {
              throw "Windows CI policy: zero skipped tests required (found $skipped). Run pytest -q -rs locally."
            }
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  build-smoke:
    name: build-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build API image
        run: docker build -t er-platform-api:ci-${{ github.sha }} .

      - name: Compose + health contract tests
        run: pytest -q tests/test_compose_platform_contract.py tests/test_platform_health_routes.py

  frontend:
    name: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_PLATFORM_API: http://127.0.0.1:8000
