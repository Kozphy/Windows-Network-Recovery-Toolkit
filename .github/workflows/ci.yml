name: CI

on:
  push:
    branches: [main, master, amd_version]
  pull_request:
    branches: [main, master, amd_version]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check platform_core backend evidence failure_system tests/policy tests/api tests/replay

      - name: Ruff format check
        run: ruff format --check platform_core backend evidence failure_system tests/policy tests/api tests/replay

      - name: Black format check
        run: black --check platform_core backend evidence failure_system tests/policy tests/api tests/replay

      - name: Mypy (scoped)
        run: mypy

      - name: Safety regression suite
        run: >
          pytest -q
          tests/test_policy_safety_contract.py
          tests/test_replay_determinism.py
          tests/test_audit_contract.py
          tests/test_api_dry_run_default.py
          tests/policy tests/api tests/replay
          tests/test_safety_regression.py

      - name: Pytest (full offline)
        run: pytest -q
        env:
          PYTHONPATH: ${{ github.workspace }}
