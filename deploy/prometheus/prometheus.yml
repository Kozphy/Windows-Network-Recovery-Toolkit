global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: endpoint-reliability-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: er-platform-api
          stack: decision-intelligence

  - job_name: decision-intelligence-api
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: decision-intelligence-api
          component: decision_intelligence
