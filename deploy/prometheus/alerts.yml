groups:
  - name: endpoint_reliability_alerts
    rules:
      - alert: suspicious_proxy_changes
        expr: sum(increase(proxy_change_total[15m])) > 3
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: Suspicious proxy change rate detected
          description: >
            More than three proxy_change_total increments in 15 minutes across the fleet.
            This is an observation-tier signal — investigate before any remediation.
            Correlation is not causation; metrics do not prove registry writer identity.

      - alert: excessive_policy_blocks
        expr: sum(rate(policy_block_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: Elevated policy BLOCK rate
          description: >
            Policy engine is blocking frequently. Review policy drift, RBAC misconfiguration,
            or hostile inputs. BLOCK metrics measure policy outcomes, not attack confirmation.

      - alert: repeated_registry_modifications
        expr: sum(increase(proxy_change_total{hypothesis=~"proxy.*"}[1h])) > 5
        for: 15m
        labels:
          severity: critical
          team: security
        annotations:
          summary: Repeated proxy/registry modification signals
          description: >
            High count of proxy_change_total with registry-related hypothesis labels in one hour.
            Escalate for human review — Sysmon/Procmon proof tier may still be required before attribution.

  - name: decision_intelligence_alerts
    rules:
      - alert: decision_accuracy_low
        expr: decision_accuracy < 0.5 and decisions_total > 0
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: Decision accuracy below 50%
          description: >
            Outcome learning accuracy gauge is below 0.5. Review counterfactual assumptions
            and post-event outcomes — accuracy is ordinal batch quality, not probability.

      - alert: decision_failure_spike
        expr: increase(decision_failures[15m]) > 3
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: Elevated decision failure count
          description: >
            More than three decision_failures recorded in 15 minutes via the Decision Intelligence API.

      - alert: decision_latency_high
        expr: decision_latency_seconds > 2
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: Decision Intelligence API latency elevated
          description: Mean handler latency for /decision-intelligence routes exceeds 2 seconds.
