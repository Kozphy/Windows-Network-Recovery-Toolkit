# Optional scrape config when API runs on host (monitoring-only compose).
# Merge manually or reference from prometheus.yml as second scrape_configs file.

scrape_configs:
  - job_name: decision-intelligence-host-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: decision-intelligence-api
          environment: local
