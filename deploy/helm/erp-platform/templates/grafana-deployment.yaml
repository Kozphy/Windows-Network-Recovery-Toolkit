{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "erp-platform.fullname" . }}-grafana
  labels:
    {{- include "erp-platform.grafana.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "erp-platform.grafana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erp-platform.grafana.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: {{ include "erp-platform.fullname" . }}-grafana-datasources
        - name: dashboards-provider
          configMap:
            name: {{ include "erp-platform.fullname" . }}-grafana-dashboards
        - name: dashboards
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "erp-platform.fullname" . }}-grafana
  labels:
    {{- include "erp-platform.grafana.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      name: http
  selector:
    {{- include "erp-platform.grafana.selectorLabels" . | nindent 4 }}
{{- end }}
