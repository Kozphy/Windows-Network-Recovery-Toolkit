{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "erp-platform.fullname" . }}-prometheus
  labels:
    {{- include "erp-platform.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: endpoint-reliability-api
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ include "erp-platform.fullname" . }}-api:{{ .Values.api.service.port }}"]
            labels:
              service: er-platform-api
  alerts.yml: |
    groups:
      - name: endpoint_reliability_alerts
        rules:
          - alert: suspicious_proxy_changes
            expr: sum(increase(proxy_change_total[15m])) > 3
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: Suspicious proxy change rate detected
          - alert: excessive_policy_blocks
            expr: sum(rate(policy_block_total[5m])) > 0.05
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: Elevated policy BLOCK rate
{{- end }}
