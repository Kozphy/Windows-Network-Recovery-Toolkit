apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "erp-platform.fullname" . }}-api
  labels:
    {{- include "erp-platform.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "erp-platform.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erp-platform.api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "erp-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PLATFORM_REPO_ROOT
              value: /app
            {{- range $key, $value := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.api.existingSecret }}
            - name: {{ .Values.api.secretKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.existingSecret }}
                  key: {{ .Values.api.secretKey }}
            {{- end }}
          volumeMounts:
            - name: platform-data
              mountPath: /data/platform
          livenessProbe:
            httpGet:
              path: /platform/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /platform/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: platform-data
          {{- if .Values.api.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "erp-platform.fullname" . }}-api-data
          {{- else }}
          emptyDir: {}
          {{- end }}
