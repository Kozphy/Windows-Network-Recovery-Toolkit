# Reference stack for fleet-scale integration testing (NOT production topology).
# Usage: docker compose -f docker-compose.yml -f docker-compose.scale.yml up
#
# Validates: ingest gateway → idempotency (Redis) → stream (Redpanda) → Postgres metadata

services:
  api:
    environment:
      FLEET_MODE: stream
      FLEET_PARTITION_COUNT: "32"
      FLEET_TOPIC_PREFIX: erp
      PLATFORM_DATABASE_URL: postgresql://erp:erp@postgres:5432/erp
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5433:5432"
    volumes:
      - ./platform_core/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Optional: OTel collector for trace validation in scale tests
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    profiles: ["observability-full"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
