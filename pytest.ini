[pytest]
pythonpath = .
testpaths = tests windows_network_toolkit/tests
python_files = test_*.py
norecursedirs =
    .git
    __pycache__
    integration_linux
    node_modules
    .venv
    venv
addopts = --strict-markers --import-mode=importlib
markers =
    linux_integration: real Linux kernel behavior (tests/integration_linux; Linux CI only)
