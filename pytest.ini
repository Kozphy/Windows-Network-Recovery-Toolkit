[pytest]
pythonpath = .
testpaths = tests windows_network_toolkit/tests
python_files = test_*.py
# Extend pytest defaults (do not replace — Hypothesis warns if .hypothesis is missing).
norecursedirs =
    .git
    __pycache__
    *.egg
    .eggs
    dist
    build
    docs
    .tox
    .nox
    .pytest_cache
    .hypothesis
    integration_linux
    node_modules
    .venv
    venv
addopts = --strict-markers --import-mode=importlib -p no:schemathesis --basetemp=.pytest-tmp
markers =
    linux_integration: real Linux kernel behavior (tests/integration_linux; Linux CI only)
    scale: synthetic local scale tests (100/1k/10k endpoint fixtures; not production benchmarks)
