# Endpoint Reliability Platform — production-shaped local stack
# Services: api + Prometheus + Grafana
# Safety: PLATFORM_SAFE_MODE=1 · dry-run remediation default · no auto-repair sidecars

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PLATFORM_SAFE_MODE: "1"
      PLATFORM_DATA_DIR: /data/platform
      FAIL_FAST_ON_STARTUP: "1"
      REQUIRE_PING_BINARY: "1"
      PLATFORM_API_KEY: ${PLATFORM_API_KEY:-dev-platform-key-change-me}
    volumes:
      - platform_data:/data/platform
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/platform/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  platform_data:
  grafana_data:
